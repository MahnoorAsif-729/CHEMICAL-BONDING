<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Stoichiometry Exam Pro</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family: 'Segoe UI', sans-serif;
  background: radial-gradient(circle at top left, #0f2027, #203a43, #2c5364);
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
}

/* MAIN CONTAINER */
.container{
  width:95%;
  max-width:1100px;
  background: rgba(255,255,255,0.08);
  border-radius:22px;
  overflow:hidden;
  box-shadow:0 25px 70px rgba(0,0,0,0.5);
  display:flex;
  backdrop-filter: blur(18px);
  border:1px solid rgba(255,255,255,0.15);
}

/* MAIN */
.main{
  flex:3;
}

/* SIDEBAR */
.sidebar{
  display:none;
  flex:1;
  background: linear-gradient(180deg, rgba(255,255,255,0.08), rgba(255,255,255,0.03));
  padding:15px;
  border-left:1px solid rgba(255,255,255,0.1);
  overflow-y:auto;
  max-height:100vh;
}

/* HEADER */
.header{
  background: linear-gradient(135deg, #ff6a00, #ee0979);
  color:white;
  text-align:center;
  padding:22px;
  font-size:19px;
  letter-spacing:1px;
  font-weight:bold;
  box-shadow:0 4px 20px rgba(0,0,0,0.3);
}

/* SCREEN */
.screen{
  padding:30px;
  text-align:center;
  color:white;
}

/* INPUT */
input{
  padding:12px;
  width:min(90%,420px);
  border-radius:12px;
  border:1px solid rgba(255,255,255,0.2);
  margin:6px 0;
  outline:none;
  font-size:16px;
  background:rgba(255,255,255,0.08);
  color:white;
  transition:0.3s;
}

input::placeholder{
  color:rgba(255,255,255,0.6);
}

input:focus{
  border-color:#00f5d4;
  box-shadow:0 0 12px rgba(0,245,212,0.5);
}

/* BUTTONS */
button{
  padding:10px 18px;
  border:none;
  border-radius:30px;
  background: linear-gradient(135deg, #00f5d4, #00bbf9);
  color:#0f2027;
  cursor:pointer;
  margin:6px 4px;
  font-weight:bold;
  transition:0.3s;
  box-shadow:0 4px 15px rgba(0,0,0,0.3);
}

button:hover{
  transform:translateY(-3px) scale(1.03);
  box-shadow:0 8px 20px rgba(0,245,212,0.4);
}

button.refresh{
  background: linear-gradient(135deg, #38ef7d, #11998e);
}

button.danger{
  background: linear-gradient(135deg, #ff416c, #ff4b2b);
}

/* QUIZ */
.quiz{
  padding:20px;
  color:white;
}

/* TOPBAR */
.topbar{
  display:flex;
  justify-content:space-between;
  font-weight:bold;
  margin-bottom:10px;
  flex-wrap:wrap;
  gap:10px;
}

/* TIMER */
.timer{
  color:#ff4d6d;
  font-size:18px;
  font-weight:bold;
  text-shadow:0 0 10px rgba(255,77,109,0.6);
}

/* QUESTION */
.question{
  font-size:20px;
  margin-bottom:15px;
  line-height:1.6;
}

/* OPTIONS */
.option{
  background: rgba(255,255,255,0.08);
  padding:12px;
  margin:8px 0;
  border-radius:12px;
  cursor:pointer;
  transition:0.25s;
  user-select:none;
  border:1px solid rgba(255,255,255,0.1);
  color:white;
}

.option:hover{
  background: rgba(0,245,212,0.15);
  border-color:#00f5d4;
}

/* CORRECT / WRONG */
.option.correct{
  background: linear-gradient(135deg, #00c853, #64dd17);
  color:white;
}

.option.wrong{
  background: linear-gradient(135deg, #ff1744, #d50000);
  color:white;
}

/* NAV */
.navbtns{
  display:flex;
  justify-content:space-between;
  margin-top:15px;
  gap:8px;
  flex-wrap:wrap;
}

/* QUESTION BUTTONS */
.qbtn{
  width:35px;
  height:35px;
  margin:4px;
  border-radius:50%;
  border:none;
  cursor:pointer;
  background:rgba(255,255,255,0.2);
  font-weight:bold;
  color:white;
  transition:0.3s;
}

.qbtn:hover{
  transform:scale(1.15);
  background:#00f5d4;
  color:#000;
}

.qbtn.active{
  background: linear-gradient(135deg,#00f5d4,#00bbf9);
  color:black;
}

.qbtn.answered{
  background: linear-gradient(135deg,#667eea,#764ba2);
  color:white;
}

/* RESULT */
.result{
  padding:25px;
  color:white;
}

/* CARD */
.card{
  background: rgba(255,255,255,0.08);
  padding:15px;
  margin:10px 0;
  border-radius:12px;
  border-left:5px solid;
  text-align:left;
  line-height:1.6;
  backdrop-filter: blur(10px);
}

.right{
  border-left-color:#00c853;
}

.wrongc{
  border-left-color:#ff1744;
}

/* SCORE */
.score{
  font-size:3rem;
  text-align:center;
  color:#00f5d4;
  font-weight:bold;
  text-shadow:0 0 20px rgba(0,245,212,0.5);
}

/* LEADERBOARD */
.leaderboard{
  margin-top:20px;
  padding:20px;
  background: rgba(255,255,255,0.06);
  border-radius:15px;
  border:1px solid rgba(255,255,255,0.1);
  max-height:300px;
  overflow-y:auto;
}

/* ROW */
.lb-row{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:12px 8px;
  margin:6px 0;
  background: rgba(255,255,255,0.08);
  border-radius:10px;
  transition:0.3s;
}

.lb-row:hover{
  transform:translateX(6px);
  background: rgba(0,245,212,0.1);
}

/* RANK */
.rank{
  font-size:20px;
  font-weight:bold;
  color:#00f5d4;
}

/* NAME */
.student-name{
  flex:1;
  font-weight:500;
  color:white;
}

/* SCORE */
.student-score{
  font-weight:bold;
  color:#38ef7d;
}

/* HIGHLIGHT */
.me-highlight{
  background: linear-gradient(135deg,#00f5d4,#00bbf9) !important;
  color:black !important;
}

/* NOTE */
.small-note{
  font-size:12px;
  color:rgba(255,255,255,0.7);
  margin-top:12px;
  padding:10px;
  background: rgba(255,255,255,0.05);
  border-radius:8px;
}

/* HIDE */
.hidden{
  display:none !important;
}

/* MOBILE */
@media (max-width:768px){
  .container{ flex-direction:column; }
  .sidebar{ display:none !important; }
  .lb-row{ flex-direction:column; gap:6px; text-align:center; }
}
</style>    
</head>
<body>

<div class="container">

  <div class="main">
    <div class="header">
      <h2>Chemical Bonding TEST PRO</h2>

    </div>

</div>

    <script>
    // 🔥 FULLY WORKING LEADERBOARD - NO FIREBASE NEEDED!
    class LeaderboardManager {
    constructor() {
        this.init();
    }
    
    init() {
        this.loadAllRooms();
    }
    
    getRoomKey(room) {
       return `bonding_${room.toUpperCase().trim()}`;
    }
   
   
    saveRoomData(room, scores) {
        const key = this.getRoomKey(room);
        localStorage.setItem(key, JSON.stringify({
        room: room.toUpperCase(),
        scores: scores,
        lastUpdated: new Date().toISOString()   
        }));
        this.allRooms[key] = { room, scores, lastUpdated: new Date().toISOString() };
    }
    
    loadAllRooms() {
        this.allRooms = {};
        for(let i = 0; i < localStorage.length; i++) {
        const key = localStorage.key(i);
        if(key.startsWith('bonding_')) {
            try {
            this.allRooms[key] = JSON.parse(localStorage.getItem(key));
            } catch(e) {
            localStorage.removeItem(key);
            }
        }
        }
    }
    
    getRoomLeaderboard(room) {
        const key = this.getRoomKey(room);
        return this.allRooms[key]?.scores || [];
    }
    
    addScore(room, name, score, total) {
        let scores = this.getRoomLeaderboard(room);
        // Add new scoresss
      
        scores.push({
        name: name.trim(),
        score: score,
        total: total,
        date: new Date().toISOString(),
        percent: Math.round((score/total)*100)
        });
        
        scores.sort((a,b) => b.score - a.score || new Date(b.date) - new Date(a.date));
        
        scores = scores.slice(0, 50);
        
        this.saveRoomData(room, scores);
        return scores;
    }
    
    renderLeaderboard(containerId, room, highlightName = null) {
        const scores = this.getRoomLeaderboard(room);
        const container = document.getElementById(containerId);
        
        if(scores.length === 0) {
        container.innerHTML = '<div style="text-align:center; color:#666; padding:20px;">No scores yet!<br>Be the first to finish the test! 🎉</div>';
        return { count: 0, topScore: 0 };
        }
        
        let html = '';
        scores.forEach((entry, index) => {
        const isMe = highlightName && entry.name.toLowerCase() === highlightName.toLowerCase();
        const rankClass = isMe ? 'me-highlight' : '';
        const rankEmoji = index === 0 ? '🥇' : index === 1 ? '🥈' : index === 2 ? '🥉' : `#${index+1}`;
        
        html += `
            <div class="lb-row ${rankClass}">
            <div class="rank">${rankEmoji}</div>
            <div class="student-name">${entry.name}</div>
            <div class="student-score">${entry.score}/${entry.total} (${entry.percent}%)</div>
            </div>
        `;
        });
        
        container.innerHTML = html;
        return { 
        count: scores.length, 
        topScore: scores[0]?.score || 0,
        myRank: scores.findIndex(s => s.name.toLowerCase() === highlightName?.toLowerCase()) + 1
        };
    }
    
    renderGlobalTop(containerId) {
        const allScores = [];
        Object.values(this.allRooms).forEach(roomData => {
        roomData.scores.forEach(score => {
            allScores.push({...score, room: roomData.room});
        });
        });
        
        allScores.sort((a,b) => b.score - a.score || new Date(b.date) - new Date(a.date));
        const top10 = allScores.slice(0, 10);
        
        const container = document.getElementById(containerId);
        let html = '';
        
        if(top10.length === 0) {
        html = '<div style="text-align:center; color:#666;">No scores yet!</div>';
        } else {
        top10.forEach((entry, index) => {
            const rankEmoji = index === 0 ? '🥇' : index === 1 ? '🥈' : index === 2 ? '🥉' : `#${index+1}`;
            html += `
            <div class="lb-row">
                <div class="rank">${rankEmoji}</div>
                <div class="student-name">${entry.name} <small style="color:#666;">(${entry.room})</small></div>
                <div class="student-score">
  ${entry.score}/${entry.total} (${entry.percent}%) - ${getGrade(entry.percent)}
</div>
            </div>
            `;
        });
        }
        
        container.innerHTML = html;
        
        document.getElementById('globalStats').textContent = 
        `📊 ${top10.length} students | 🥇 Top: ${top10[0]?.score || 0}/35`;
    }
    }

    const leaderboard = new LeaderboardManager();

    // Quiz variables
   const questions = [

{

},

{

},

{
q:"Which of the following species are paramagnetic due to presence of unpaired electrons?",

o:["NH₃","NH₄⁺","CH₄","HCl"],

o:["Cl₂","Br₂","I₂","All equal"],

o:["Linear","Trigonal planar","Bent","Tetrahedral"],

{
q:"Which hydrogen halide exhibits strongest hydrogen bonding?",
o:["HCl","HF","HBr","HI"],
a:"HF",

},

{
q:"Considering molecular orbital theory and electron configuration, which of the following species simultaneously exhibits highest bond order, shortest bond length, and paramagnetic behavior?",
o:["O₂","O₂⁺","O₂⁻","O₂²⁻"],

    let current = 0;
    let score = 0;

    // Initialize
    document.addEventListener('DOMContentLoaded', function() {
    updateRoomDisplay();
    refreshGlobalBoard();
    document.getElementById('room').addEventListener('input', function(e) {
        e.target.value = e.target.value.toUpperCase();
        updateRoomDisplay();
    });
    });

    function updateRoomDisplay() {
    const room = document.getElementById('room').value.trim();
    const display = document.getElementById('currentRoom');
    if(room) {
        display.textContent = `📍 Room: ${room}`;
        display.style.opacity = '1';
    } else {
        display.textContent = 'Enter room code to compete!';
        display.style.opacity = '0.7';
    }
    }

    function show(elId) { document.getElementById(elId).classList.remove("hidden"); }
    function hide(elId) { document.getElementById(elId).classList.add("hidden"); }

    function resetTestState() {
    current = 0; score = 0; time = 900; submitted = false;
    answers = Array(questions.length).fill(null);
    locked = Array(questions.length).fill(false);
    clearInterval(timer);
    document.getElementById("score").innerText = "0";
    document.getElementById("time").innerText = "15:00";
    }

    function validateInputs() {
    testName = document.getElementById("name").value.trim();
    testRoom = document.getElementById("room").value.trim().toUpperCase();
    
    if(!testName) {
        alert("⚠️ Please enter your name!");
        return false;
    }
    if(!testRoom) {
        alert("⚠️ Enter Room Code to join leaderboard!\n\nExample: CHEMISTRY");
        return false;
    }
    return true;
    }

    function createRoom() {
    if(!validateInputs()) return;
    alert(`🎉 Room "${testRoom}" created!\nShare this code with friends to compete!`);
    updateRoomDisplay();
    refreshRoomBoard();
    }

    function joinRoom() {
    if(!validateInputs()) return;
    alert(`✅ Joined room "${testRoom}"!\nYour competition leaderboard is ready!`);
    updateRoomDisplay();
    refreshRoomBoard();
    }

    function startTest() {
    if(!validateInputs()) return;
    
    hide("start");
    show("quiz");
    document.querySelector(".sidebar").style.display = "block";
    
    resetTestState();
    renderNav();
    loadQ();
    runTimer();
    }

    function runTimer() {
    clearInterval(timer);
    timer = setInterval(() => {
        time--;
        let m = Math.floor(time / 60);
        let s = time % 60;
        document.getElementById("time").innerText = `${m}:${s < 10 ? "0" + s : s}`;
        if(time <= 0) showResult();
    }, 1000);
    }
   

   function loadQ(){
  const q = questions[current];

  let options = shuffle([...q.o]);

  let html = `<div class="question">${current+1}. ${q.q}</div>`;

   options.forEach(opt=>{
  html += `<div class="option" onclick="ans(this, '${opt}')">
    ${opt}
  </div>`;
});

   document.getElementById("questionBox").innerHTML = html;

  updateNav();
  document.getElementById("qno").innerText = current + 1;
}

function ans(el, selected){
  const q = questions[current];

  if(locked[current]) return; 

  answers[current] = selected;

  document.querySelectorAll(".option").forEach(op=>{
    if(op.innerText.trim() === q.a){
      op.classList.add("correct");
    }
    if(op.innerText.trim() === selected && selected !== q.a){
      op.classList.add("wrong");
    }
  });

  // score logic
  if(selected === q.a){
    score++;
  }

  locked[current] = true;
  document.getElementById("score").innerText = score;

  updateNav();
}

    function nextQ() {
  if(current < questions.length - 1){
    current++;
    loadQ();
  }
}

function prevQ() {
  if(current > 0){
    current--;
    loadQ();
  }
}

    function renderNav() {
    let nav = "";
    for(let i = 0; i < questions.length; i++) {
        nav += `<button class="qbtn" onclick="go(${i})">${i + 1}</button>`;
    }
    document.getElementById("nav").innerHTML = nav;
    updateNav();
    }

    function go(i) {
  current = i;
  loadQ();
}

    function updateNav() {
    document.querySelectorAll(".qbtn").forEach((b, i) => {
        b.classList.remove("active", "answered");
        if(i === current) b.classList.add("active");
        if(answers[i] !== null) b.classList.add("answered");
    });
    }

    function shuffle(array) {
    return array.sort(() => Math.random() - 0.5);
    }

    async function saveScore() {
    leaderboard.addScore(testRoom, testName, score, questions.length);
    }

    function refreshGlobalBoard() {
    leaderboard.renderGlobalTop('globalBoard');
    }

    function refreshRoomBoard() {
    if(!testRoom) return;
    const stats = leaderboard.renderLeaderboard('roomBoard', testRoom, testName);
    document.getElementById('roomTitle').textContent = testRoom;
    document.getElementById('roomStats').textContent = 
        `👥 ${stats.count} students | 🥇 Top: ${stats.topScore}/35`;
    }

    function goToRoomLeaderboard() {
    hide("result");
    show("roomLeaderboard");
    refreshRoomBoard();
    }

    function backToResult() {
    hide("roomLeaderboard");
    show("result");
    }

    function backToStart() {
    hide("quiz");
    hide("result");
    hide("roomLeaderboard");
    show("start");
    document.querySelector(".sidebar").style.display = "none";
    document.getElementById("start").style.display = "block";
    resetTestState();
    refreshGlobalBoard();
    }
   async function showResult() {
  if(submitted) return;
  submitted = true;
  
  clearInterval(timer);
  await saveScore();             // Save to leaderboard 
  
  hide("quiz");
  show("result");
  document.querySelector(".sidebar").style.display = "none";
  hide("roomLeaderboard");
  
  //  PERCENTAGE CALCULATION 
  let percent = 0;
  if(questions.length > 0){
    percent = Math.round((score / questions.length) * 100);
  }

  //  GRADING SYSTEM
  let grade = "FAIL 🔴";
  let statusColor = "#dc3545";

  if (percent >= 80) {
    grade = "DISTINCTION 🏆";
    statusColor = "#6f42c1";
  } 
  else if (percent >= 70) {
    grade = "A+ ⭐";
    statusColor = "#007bff";
  } 
  else if (percent >= 60) {
    grade = "A 👍";
    statusColor = "#28a745";
  } 
  else if (percent >= 50) {
    grade = "B 🙂";
    statusColor = "#ffc107";
  }

  // RESULT DISPLAY 
  document.getElementById("finalScore").innerHTML = `
    <div style="font-size:3rem; font-weight:bold;">
      ${score}/${questions.length}
    </div>
    <div style="
      font-size:1.6rem;
      font-weight:bold;
      color:${statusColor};
      margin-top:8px;
    ">
      ${percent}% - ${grade}
    </div>
  `;

  document.getElementById("resultName").textContent = testName;
  
  // 🧾 EXPLANATIONS 
  let html = '';
  questions.forEach((q, i) => {
    let user = answers[i];
    html += `
      <div class="card ${user === q.a ? 'right' : 'wrongc'}">
        <b>Q${i + 1}:</b> ${q.q}<br><br>
       <b>Your Answer:</b> ${user ? user : "Not Answered"} ${user === q.a ? "✔️" : "❌"}<br>
<b>Correct:</b> ${q.a} ✔️<br>
        <b>Correct:</b> ${q.o[q.a]} ✔️<br><br>
        <i>${q.e}</i>
      </div>
    `;
  });
  document.getElementById("explanations").innerHTML = html;
  
  // 🏆 Rank alert (UNCHANGED)
  setTimeout(() => {
    const stats = leaderboard.renderLeaderboard('roomBoard', testRoom, testName);
    if(stats.myRank && stats.myRank > 0) {
      alert(`🎉 Your Rank: #${stats.myRank} in room ${testRoom}\nScore: ${score}/${questions.length}`);
    }
  }, 500);
}   

function getGrade(percent){
  if(percent >= 80) return "A+ 🏆";
  if(percent >= 70) return "A ⭐";
  if(percent >= 60) return "B 👍";
  if(percent >= 50) return "C 🙂";
  return "F ❌";
}

    //  functions globally
    window.createRoom = createRoom;
    window.joinRoom = joinRoom;
    window.startTest = startTest;
    window.nextQ = nextQ;
    window.prevQ = prevQ;
    window.showResult = showResult;
    window.goToRoomLeaderboard = goToRoomLeaderboard;
    window.backToResult = backToResult;
    window.backToStart = backToStart;
    window.refreshGlobalBoard = refreshGlobalBoard;
    window.refreshRoomBoard = refreshRoomBoard;
    window.go = go;

    // Auto   refresh
    setInterval(refreshGlobalBoard, 30000);

    console.log("✅ Stoichiometry Exam Pro - Fully Working Leaderboard Loaded!");
    </script>
